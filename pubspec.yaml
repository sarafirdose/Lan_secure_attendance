name: secure_attendance
description: Secure LAN QR Attendance System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  connectivity_plus: ^6.0.3
  device_info_plus: ^10.1.0
  network_info_plus: ^5.0.0
  permission_handler: ^11.3.1
  mobile_scanner: ^5.2.3
  shared_preferences: ^2.3.1
  http: ^1.2.0
  flutter_animate: ^4.5.0
  provider: ^6.1.2
  crypto: ^3.0.3
  uuid: ^4.4.2
  intl: ^0.19.0
  qr_flutter: ^4.1.0
  fl_chart: ^1.2.0
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4
  google_fonts: ^8.0.2
  logger: ^2.4.0
  workmanager: ^0.9.0
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/